<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Setup Collections - Family Hub</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        h1 { color: #FF6B6B; }
        button { background: #4ECDC4; color: white; border: none; padding: 15px 30px; font-size: 16px; cursor: pointer; border-radius: 10px; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .log { background: #f5f5f5; padding: 20px; border-radius: 10px; max-height: 400px; overflow-y: auto; margin-top: 20px; }
        .success { color: green; }
        .error { color: red; }
        .info { color: #666; }
    </style>
</head>
<body>
    <h1>🚀 Setup Collections - Family Hub</h1>
    <p>Cliquez sur le bouton pour créer toutes les collections.</p>
    <button id="startBtn" onclick="startSetup()">Créer les collections</button>
    <div class="log" id="log"></div>

    <script>
        const ENDPOINT = 'https://backend.071098v2.duckdns.org/v1';
        const API_KEY = 'eab72d539f918bdc0d68a42bb9c079f18fc2f4fa04b84e3cc461fa621dc94ac7263b91178b0f951830f329203ad000b11c49e419dd9e7df6849e4849a628b29996cbd7dc4debdbf66f4465cea0b4d10bc427c63bf72b6ef9be08e3a5c6c39450ad4e2ec46f604801dca6a4ef5e36ec9fa56251254ef1991913ea2f82cdbff9b7';
        const DB_ID = 'family_hub';

        const collections = [
            {
                name: 'users_profile',
                attributes: [
                    { key: 'userId', type: 'string', size: 50, required: true },
                    { key: 'email', type: 'string', size: 255, required: true },
                    { key: 'name', type: 'string', size: 255, required: true },
                    { key: 'familyId', type: 'string', size: 50, required: false },
                    { key: 'avatar', type: 'string', size: 500, required: false },
                    { key: 'createdAt', type: 'datetime', required: false }
                ]
            },
            {
                name: 'families',
                attributes: [
                    { key: 'name', type: 'string', size: 255, required: true },
                    { key: 'ownerId', type: 'string', size: 50, required: true },
                    { key: 'inviteCode', type: 'string', size: 20, required: false },
                    { key: 'monthlyBudget', type: 'double', required: false },
                    { key: 'createdAt', type: 'datetime', required: false }
                ]
            },
            {
                name: 'family_members',
                attributes: [
                    { key: 'familyId', type: 'string', size: 50, required: true },
                    { key: 'userId', type: 'string', size: 50, required: true },
                    { key: 'role', type: 'string', size: 20, required: true },
                    { key: 'name', type: 'string', size: 255, required: true },
                    { key: 'avatar', type: 'string', size: 500, required: false }
                ]
            },
            {
                name: 'events',
                attributes: [
                    { key: 'familyId', type: 'string', size: 50, required: true },
                    { key: 'title', type: 'string', size: 255, required: true },
                    { key: 'description', type: 'string', size: 1000, required: false },
                    { key: 'date', type: 'datetime', required: true },
                    { key: 'endDate', type: 'datetime', required: false },
                    { key: 'color', type: 'string', size: 20, required: false },
                    { key: 'category', type: 'string', size: 50, required: false },
                    { key: 'assignedTo', type: 'string', size: 50, required: false },
                    { key: 'reminder', type: 'boolean', required: false },
                    { key: 'createdBy', type: 'string', size: 50, required: true }
                ]
            },
            {
                name: 'chores',
                attributes: [
                    { key: 'familyId', type: 'string', size: 50, required: true },
                    { key: 'title', type: 'string', size: 255, required: true },
                    { key: 'description', type: 'string', size: 500, required: false },
                    { key: 'frequency', type: 'string', size: 20, required: false },
                    { key: 'points', type: 'integer', required: false },
                    { key: 'assignedTo', type: 'string', size: 50, required: false },
                    { key: 'dueDate', type: 'datetime', required: false },
                    { key: 'status', type: 'string', size: 20, required: false },
                    { key: 'createdBy', type: 'string', size: 50, required: true }
                ]
            },
            {
                name: 'budget_entries',
                attributes: [
                    { key: 'familyId', type: 'string', size: 50, required: true },
                    { key: 'amount', type: 'double', required: true },
                    { key: 'category', type: 'string', size: 50, required: true },
                    { key: 'description', type: 'string', size: 255, required: false },
                    { key: 'date', type: 'datetime', required: true },
                    { key: 'type', type: 'string', size: 20, required: true },
                    { key: 'createdBy', type: 'string', size: 50, required: true }
                ]
            },
            {
                name: 'alcohol_logs',
                attributes: [
                    { key: 'userId', type: 'string', size: 50, required: true },
                    { key: 'date', type: 'datetime', required: true },
                    { key: 'drinkType', type: 'string', size: 50, required: true },
                    { key: 'volumeCl', type: 'double', required: true },
                    { key: 'abv', type: 'double', required: true },
                    { key: 'units', type: 'double', required: true },
                    { key: 'context', type: 'string', size: 100, required: false },
                    { key: 'notes', type: 'string', size: 500, required: false },
                    { key: 'mood', type: 'string', size: 50, required: false }
                ]
            }
        ];

        const log = document.getElementById('log');
        const btn = document.getElementById('startBtn');

        function addLog(message, type = 'info') {
            const p = document.createElement('p');
            p.className = type;
            p.textContent = message;
            log.appendChild(p);
            log.scrollTop = log.scrollHeight;
        }

        async function apiCall(endpoint, method, data) {
            const response = await fetch(endpoint, {
                method: method,
                headers: {
                    'Content-Type': 'application/json',
                    'X-Appwrite-Key': API_KEY
                },
                body: JSON.stringify(data)
            });
            return response.json();
        }

        async function createCollection(collection) {
            addLog(`Création de "${collection.name}"...`, 'info');
            try {
                const result = await apiCall(`${ENDPOINT}/databases/${DB_ID}/collections`, 'POST', {
                    name: collection.name,
                    permissions: ['read("users")', 'create("users")', 'update("users")', 'delete("users")'],
                    attributes: collection.attributes
                });
                if (result.$id) {
                    addLog(`✅ ${collection.name} créé`, 'success');
                    return true;
                } else if (result.code === 409) {
                    addLog(`ℹ️ ${collection.name} existe déjà`, 'info');
                    return true;
                } else {
                    addLog(`❌ ${collection.name}: ${result.message || 'erreur'}`, 'error');
                    return false;
                }
            } catch (e) {
                addLog(`❌ Erreur: ${e.message}`, 'error');
                return false;
            }
        }

        async function startSetup() {
            btn.disabled = true;
            btn.textContent = 'Création en cours...';
            log.innerHTML = '';

            addLog('🚀 Création des collections...', 'info');
            addLog('==============================', 'info');

            for (const collection of collections) {
                await createCollection(collection);
                await new Promise(r => setTimeout(r, 500));
            }

            addLog('', 'info');
            addLog('==============================', 'info');
            addLog('✅ Terminé !', 'success');

            btn.textContent = 'Terminé !';
        }
    </script>
</body>
</html>
